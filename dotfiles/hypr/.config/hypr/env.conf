# ─── Environment (spec §6, §10) ─────────────────────────────────────────────
# Session identity — required so portals, DMS and Qt/GTK apps detect Hyprland.
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# Qt: prefer Wayland, fall back to xcb so X11-only Qt apps still run.
# Note the quoting — the literal value is `wayland;xcb`.
# The `;` is intentional and literal (Qt's platform-list separator), NOT a shell
# statement separator: Hyprland reads the env value to end of line, so the
# whole `wayland;xcb` is assigned verbatim.
env = QT_QPA_PLATFORM,wayland;xcb

# Qt platform theme — DMS themes Qt via qt6ct (matugen writes the qt6ct color
# scheme). Set to qt6ct per DMS docs (spec §6: "QT_QPA_PLATFORMTHEME per DMS").
env = QT_QPA_PLATFORMTHEME,qt6ct

# Let the Wayland compositor (Hyprland/DMS) draw decorations, not Qt's CSD.
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# AMD GPU (spec §2, §10): mesa + vulkan-radeon, pure Wayland. No NVIDIA/GBM vars
# are needed. amdgpu is loaded early via mkinitcpio MODULES (spec §5).
