# ─── Monitors ───────────────────────────────────────────────────────────────
# Desktop, AMD GPU (spec §2). Sane catch-all default: auto-detect every output
# at its preferred mode/refresh, auto-position, scale 1. Override per-output by
# adding explicit lines, e.g.:
#   monitor = DP-1, 3840x2160@144, 0x0, 1
#   monitor = HDMI-A-1, 1920x1080@60, 3840x0, 1
# Run `hyprctl monitors` to discover real connector names on this machine.
monitor = , preferred, auto, 1

# Wallpaper is owned by DMS (`dms ipc call wallpaper set ...`), NOT hyprpaper
# (spec §6) — DMS-managed wallpaper is what drives matugen dynamic theming.
