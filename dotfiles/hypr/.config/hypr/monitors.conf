# ─── Monitors ───────────────────────────────────────────────────────────────
# Desktop, AMD GPU (spec §2). Primary panel: Xiaomi G34WQi ultrawide,
# 3440x1440@180 over DisplayPort (HDMI on this monitor caps at 100 Hz).
# `highrr` selects the highest-refresh mode (180 Hz here) instead of the
# EDID-preferred one — this monitor declares its preferred timing in a
# DisplayID extension block, which some stacks resolve to a lower refresh.
# Falls back gracefully on any other attached display. Override per-output by
# adding explicit lines above the catch-all, e.g.:
#   monitor = DP-1, 3440x1440@180, 0x0, 1
# Run `hyprctl monitors` to discover real connector names on this machine.
monitor = , highrr, auto, 1

# Wallpaper is owned by DMS (`dms ipc call wallpaper set ...`), NOT hyprpaper
# (spec §6) — DMS-managed wallpaper is what drives matugen dynamic theming.
