# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  spede-arch — Hyprland config (entry point)                                ║
# ║                                                                            ║
# ║  Hyprland + DankMaterialShell (DMS), macOS keyboard feel.                  ║
# ║  Encodes spec §6 (desktop), §7 (input architecture) and §8 (keybinds).    ║
# ║                                                                            ║
# ║  DMS owns wallpaper, lock, idle, notifications, polkit and the launcher,  ║
# ║  so there is intentionally NO hyprpaper / hyprlock / hypridle /           ║
# ║  hyprpolkitagent here (spec §6 — duplicates conflict with DMS).           ║
# ║                                                                            ║
# ║  Modifier model (spec §7):                                                 ║
# ║    Cmd      ($mod = SUPER)  app shortcuts (→Ctrl via xremap), line-nav,    ║
# ║                             launch apps, close window                      ║
# ║    Cmd+Ctrl (SUPER CTRL)    window control — focus/move/fullscreen/lock    ║
# ║    Option  (ALT)            spaces / workspaces (xremap never touches Alt) ║
# ║                                                                            ║
# ║  This file only sources the modular configs. Edit those, not this list.   ║
# ╚══════════════════════════════════════════════════════════════════════════╝

source = ~/.config/hypr/env.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/binds.conf

# ─── Autostart (spec §6, §7) ────────────────────────────────────────────────
# DMS shell: launched via exec-once (NOT a systemd unit — spec §6: a unit would
# run it twice). `dms run` provides bar, wallpaper, lock, idle, notifications,
# polkit agent and the spotlight launcher.
exec-once = dms run

# xremap: the macOS-feel remapper (Super→Ctrl for GUI apps, line-nav, etc).
# Launched from Hyprland so it inherits HYPRLAND_INSTANCE_SIGNATURE and can do
# window-class-aware matching (spec §7, risk #7). --watch picks up new devices.
# This is the fallback launch path; if a `systemd --user` xremap unit is enabled
# instead, remove this line to avoid running two instances.
exec-once = xremap --watch ~/.config/xremap/config.yml

# XDG user dirs + portal hygiene. dbus-update-activation-environment makes the
# Wayland session vars visible to xdg-desktop-portal and other dbus services.
exec-once = dbus-update-activation-environment --systemd --all
exec-once = xdg-user-dirs-update

# Ensure the screenshot target dir exists (grim/satty won't create it).
exec-once = mkdir -p ~/Pictures/Screenshots
