# ─── Input (spec §2, §8) ────────────────────────────────────────────────────
# XKB only — NO IME (no fcitx5/ibus), which avoids the IME key-grab problem
# (spec §7). Layouts: US + Greek; toggle on Ctrl+Space (grp:ctrl_space_toggle,
# spec §2/§8 caveat — kept per explicit choice). Caps Lock left untouched.
input {
    kb_layout = us,gr
    kb_options = grp:ctrl_space_toggle

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

# Desktop build (spec §2): no touchpad/gesture layer. Hyprland ≥0.51 removed
# the gestures:workspace_swipe options in favor of the `gesture` keyword; with
# no `gesture =` lines defined there are no touch gestures — exactly what we
# want on a desktop — so no gestures block is needed at all. (The old block
# threw "config option <gestures:workspace_swipe> does not exist" at startup.)
