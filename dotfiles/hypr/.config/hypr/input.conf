# ─── Input (spec §2, §8) ────────────────────────────────────────────────────
# XKB only — NO IME (no fcitx5/ibus), which avoids the IME key-grab problem
# (spec §7). Layouts: US + Greek; toggle on Ctrl+Space (grp:ctrl_space_toggle,
# spec §2/§8 caveat — kept per explicit choice). Caps Lock left untouched.
input {
    kb_layout = us,gr
    kb_options = grp:ctrl_space_toggle

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

# Desktop build (spec §2): no touchpad/gesture layer of note. Default behaviour.
gestures {
    workspace_swipe = false
}
