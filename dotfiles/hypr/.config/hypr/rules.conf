# ─── Window rules ───────────────────────────────────────────────────────────
# DMS handles bars/notifications/lock; these are app-window behaviours only.
# Hyprland ≥0.53 unified windowrulev2 into plain `windowrule` (same regex
# selector syntax); the old keyword is deprecated and banner-warns at startup.

# Float + center common transient/dialog windows.
windowrule = float,    class:^(org.kde.dolphin)$, title:^(Copying|Moving|Deleting|Progress).*$
windowrule = float,    class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float,    title:^(Open File|Save File|Save As|Choose Files?)$
windowrule = float,    class:^(xdg-desktop-portal-gtk)$
windowrule = center,   title:^(Open File|Save File|Save As|Choose Files?)$

# Picture-in-picture (browser video) — float, pin, keep on top.
windowrule = float,    title:^(Picture[- ]in[- ][Pp]icture)$
windowrule = pin,      title:^(Picture[- ]in[- ][Pp]icture)$
windowrule = keepaspectratio, title:^(Picture[- ]in[- ][Pp]icture)$

# 1Password quick-access / mini windows float.
windowrule = float,    class:^(1Password)$, title:^(Quick Access — 1Password)$

# Bitwarden popup floats.
windowrule = float,    class:^(Bitwarden)$

# Telegram / Slack media viewers float.
windowrule = float,    class:^(org.telegram.desktop)$, title:^(Media viewer)$

# Suppress activation stealing from background apps (avoid focus-jacking).
windowrule = suppressevent maximize, class:.*

# Fix occasional invisible-window resize glitch on dialogs (upstream-recommended).
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0
