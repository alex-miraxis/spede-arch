# ─── Window rules ───────────────────────────────────────────────────────────
# DMS handles bars/notifications/lock; these are app-window behaviours only.

# Float + center common transient/dialog windows.
windowrulev2 = float,    class:^(org.kde.dolphin)$, title:^(Copying|Moving|Deleting|Progress).*$
windowrulev2 = float,    class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = float,    title:^(Open File|Save File|Save As|Choose Files?)$
windowrulev2 = float,    class:^(xdg-desktop-portal-gtk)$
windowrulev2 = center,   title:^(Open File|Save File|Save As|Choose Files?)$

# Picture-in-picture (browser video) — float, pin, keep on top.
windowrulev2 = float,    title:^(Picture[- ]in[- ][Pp]icture)$
windowrulev2 = pin,      title:^(Picture[- ]in[- ][Pp]icture)$
windowrulev2 = keepaspectratio, title:^(Picture[- ]in[- ][Pp]icture)$

# 1Password quick-access / mini windows float.
windowrulev2 = float,    class:^(1Password)$, title:^(Quick Access — 1Password)$

# Bitwarden popup floats.
windowrulev2 = float,    class:^(Bitwarden)$

# Telegram / Slack media viewers float.
windowrulev2 = float,    class:^(org.telegram.desktop)$, title:^(Media viewer)$

# Suppress activation stealing from background apps (avoid focus-jacking).
windowrulev2 = suppressevent maximize, class:.*

# Fix occasional invisible-window resize glitch on dialogs (upstream-recommended).
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0
