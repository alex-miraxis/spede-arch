# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  Keybindings (spec §8 — Window manager / Hyprland table)                   ║
# ║                                                                            ║
# ║  $mod = SUPER (the macOS Cmd key). xremap sits BELOW Hyprland and rewrites ║
# ║  bare Super+letter/digit/arrow into Ctrl-equivalents / line-nav for GUI    ║
# ║  apps (spec §7). Therefore this file MUST NOT bind:                        ║
# ║    • any bare SUPER+<letter> or SUPER+<digit>  (xremap consumes them)      ║
# ║    • any bare SUPER+<arrow>                     (xremap = app line-nav)     ║
# ║  All WM binds use SUPER+Enter/Space/Q, SUPER+SHIFT+*, SUPER+CTRL+* or ALT, ║
# ║  none of which xremap touches — they pass straight through to Hyprland.    ║
# ║                                                                            ║
# ║  Modmask names: SUPER, SUPER SHIFT, SUPER CTRL, SUPER CTRL SHIFT, ALT,     ║
# ║                 ALT SHIFT.                                                  ║
# ╚══════════════════════════════════════════════════════════════════════════╝

$mod = SUPER

# ─── Apps & launchers (Cmd / Cmd+Shift) ─────────────────────────────────────
# DMS IPC verbs below (spotlight/powermenu/theme/lock/clipboard `toggle`, `lock
# lock`) verified against the DankMaterialShell IPC reference:
# danklinux.com/docs/dankmaterialshell/keybinds-ipc and
# github.com/AvengeMedia/DankMaterialShell docs/IPC.md (modals expose
# open/close/toggle; lock exposes `lock`; theme exposes toggle/light/dark).
#
# Terminal — Ghostty (Cmd+Enter). Ghostty is excluded from xremap by class
# com.mitchellh.ghostty and uses native macOS binds (spec §7/§8).
bind = $mod, Return, exec, ghostty

# Launcher / spotlight — DMS (Cmd+Space). dms ipc spotlight modal.
bind = $mod, Space, exec, dms ipc call spotlight toggle

# Browser — Helium (Cmd+Shift+B). helium-browser-bin.
bind = $mod SHIFT, B, exec, helium

# Files — Dolphin (Cmd+Shift+F). Accepted tradeoff: shadows editor find-in-files.
bind = $mod SHIFT, F, exec, dolphin

# ─── Window lifecycle (Cmd / Cmd+Shift) ─────────────────────────────────────
# Close window (Cmd+Q).
bind = $mod, Q, killactive,

# Float toggle (Cmd+Shift+Space).
bind = $mod SHIFT, Space, togglefloating,

# Power / logout menu — DMS (Cmd+Shift+Q).
bind = $mod SHIFT, Q, exec, dms ipc call powermenu toggle

# Dynamic / dark theme toggle — DMS (Cmd+Shift+Y). `theme toggle` switches the
# DMS light/dark mode; matugen dynamic theming is governed from DMS Settings
# (spec §6 — there is no separate matugen-toggle IPC verb).
bind = $mod SHIFT, Y, exec, dms ipc call theme toggle

# ─── Window control (Cmd+Ctrl) ──────────────────────────────────────────────
# Focus move (Cmd+Ctrl+arrows). Bare SUPER+arrow is reserved for xremap line-nav,
# so window focus deliberately lives on the SUPER CTRL tier.
bind = $mod CTRL, left,  movefocus, l
bind = $mod CTRL, right, movefocus, r
bind = $mod CTRL, up,    movefocus, u
bind = $mod CTRL, down,  movefocus, d

# Move window (Cmd+Ctrl+Shift+arrows).
bind = $mod CTRL SHIFT, left,  movewindow, l
bind = $mod CTRL SHIFT, right, movewindow, r
bind = $mod CTRL SHIFT, up,    movewindow, u
bind = $mod CTRL SHIFT, down,  movewindow, d

# Fullscreen (Cmd+Ctrl+F — the real macOS shortcut).
bind = $mod CTRL, F, fullscreen, 0

# Lock — DMS (Cmd+Ctrl+Q — the real macOS lock shortcut).
bind = $mod CTRL, Q, exec, dms ipc call lock lock

# Clipboard history — DMS-managed cliphist (Cmd+Ctrl+V).
bind = $mod CTRL, V, exec, dms ipc call clipboard toggle

# ─── Workspaces — Option/Alt (xremap never touches Alt; spec §7) ────────────
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9

# Move active window → workspace (Option+Shift+1..9).
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9

# ─── Screenshots (Cmd+Shift+3/4/5; spec §8) ─────────────────────────────────
# macOS-style screenshot trio, Wayland-native via grim/slurp + satty editor:
#   Cmd+Shift+3 → whole output (current monitor) to file + clipboard
#   Cmd+Shift+4 → region select → annotate in satty
#   Cmd+Shift+5 → active window → annotate in satty (hyprshot --mode window)
# grim/slurp/satty are official `extra`; hyprshot is AUR (spec §9).
bind = $mod SHIFT, 3, exec, mkdir -p ~/Pictures/Screenshots && grim -o "$(hyprctl monitors -j | jq -r '.[] | select(.focused) | .name')" - | satty --filename - --output ~/Pictures/Screenshots/screenshot-"$(date +%Y%m%d-%H%M%S)".png --early-exit --copy-command wl-copy
bind = $mod SHIFT, 4, exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" - | satty --filename - --output ~/Pictures/Screenshots/screenshot-"$(date +%Y%m%d-%H%M%S)".png --early-exit --copy-command wl-copy
bind = $mod SHIFT, 5, exec, mkdir -p ~/Pictures/Screenshots && hyprshot --mode window --raw | satty --filename - --output ~/Pictures/Screenshots/screenshot-"$(date +%Y%m%d-%H%M%S)".png --early-exit --copy-command wl-copy

# ─── Mouse — float drag/resize (Cmd+Ctrl held) ──────────────────────────────
# Kept on the SUPER CTRL window-control tier so bare SUPER drag stays free.
bindm = $mod CTRL, mouse:272, movewindow
bindm = $mod CTRL, mouse:273, resizewindow
