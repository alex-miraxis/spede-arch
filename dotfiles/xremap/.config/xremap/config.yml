# xremap — macOS-feel input layer for Hyprland (spede-arch §7)
#
# exact_match: true is MANDATORY. Without it, loose matching rewrites
# Super+Shift+F/B/Y and Super+Shift+3/4/5 into Ctrl+Shift+..., swallowing
# them before Hyprland ever sees the bind.
#
# Ghostty (class com.mitchellh.ghostty) is EXCLUDED via application.not so it
# keeps its native macOS binds (Cmd+C copy vs Ctrl+C SIGINT).
#
# NEVER add Super+Enter/Space/Q, any Super+Shift+* WM bind, or any
# Super+Ctrl+* here — those must pass through to Hyprland untouched.
exact_match: true

keymap:
  # Super+letter -> Ctrl+letter  (GUI apps; Ghostty excluded)
  - name: macOS app shortcuts (Super -> Ctrl)
    application:
      not: [/com.mitchellh.ghostty/]
    remap:
      Super-a: Ctrl-a
      Super-c: Ctrl-c
      Super-v: Ctrl-v
      Super-x: Ctrl-x
      Super-z: Ctrl-z
      Super-s: Ctrl-s
      Super-f: Ctrl-f
      Super-t: Ctrl-t
      Super-w: Ctrl-w
      Super-r: Ctrl-r
      Super-n: Ctrl-n
      Super-l: Ctrl-l
      Super-p: Ctrl-p

  # Super+digit -> Ctrl+digit  (browser tabs 1-9)
  - name: macOS browser tabs (Super digit -> Ctrl digit)
    application:
      not: [/com.mitchellh.ghostty/]
    remap:
      Super-1: Ctrl-1
      Super-2: Ctrl-2
      Super-3: Ctrl-3
      Super-4: Ctrl-4
      Super-5: Ctrl-5
      Super-6: Ctrl-6
      Super-7: Ctrl-7
      Super-8: Ctrl-8
      Super-9: Ctrl-9

  # Explicit Super+Shift+{T,V} -> Ctrl+Shift+{T,V}
  # (reopen closed tab / paste without formatting)
  - name: macOS reopen-tab and paste-plain
    application:
      not: [/com.mitchellh.ghostty/]
    remap:
      Super-Shift-t: Ctrl-Shift-t
      Super-Shift-v: Ctrl-Shift-v

  # macOS line / document navigation
  - name: macOS line navigation
    application:
      not: [/com.mitchellh.ghostty/]
    remap:
      Super-Left: Home
      Super-Right: End
      Super-Up: Ctrl-Home
      Super-Down: Ctrl-End
      Super-Shift-Left: Shift-Home
      Super-Shift-Right: Shift-End
      Super-Shift-Up: Ctrl-Shift-Home
      Super-Shift-Down: Ctrl-Shift-End
